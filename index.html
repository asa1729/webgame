<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポケモン捕獲ゲーム</title>
</head>
<body>
    <div id="pokemon-game">
        <p id="judgement">野生のピカチュウが現れた！</p>
        <button onclick="throwBall(1)">モンスターボール</button>
        <button onclick="throwBall(2)">スーパーボール</button>
        </div>

    <script>
        // --- Express側にあった変数や関数をここに移植 ---
        let mon = 'ピカチュウ';
        let poke = 1;
        let corr = [255, 20];
        let left = [50, 30, 20];
        let count = [0, 0, 0, 0, 0];
        let cri_point = 0;
        let all_inc = 0;
        let cri_judge = [5, 5, 5, 5];

        function encount() {
            choose = Math.floor( Math.random() * 5 + 1 );
            if(choose == 1){
                mon = 'ピカチュウ'; corr[0] = 255; corr[1] = 20; return choose;
            }
            else if(choose == 2){
                mon = 'モココ'; corr[0] = 190; corr[1] = 26; return choose;
            }
            else if(choose == 3 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 20){
                mon = 'ニョロトノ'; corr[0] = 120; corr[1] = 41; return choose;
            }
            else if(choose == 4 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 20){
                mon = 'ダンバル'; corr[0] = 45; corr[1] = 52; return choose;
            }
            else if(choose == 5 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 50){
                mon = 'ファイヤー'; corr[0] = 3; corr[1] = 165; return choose;
            }
            else{
                return encount(corr, left);
            }
        }

        function throwBall(ballType) {
            const ball = req.query.ball;
            let count = [
            Number(req.query.count_pika) || 0,
            Number(req.query.count_moko) || 0,
            Number(req.query.count_nyor) || 0,
            Number(req.query.count_danb) || 0,
            Number(req.query.count_fire) || 0
            ];
  
          let k = 4; t = 1;
          let a = 0; b = 0; c = 0; d = 0;
          let critical = '';
          const cri = Math.floor( Math.random() * 255 + 1 );
          let num = new Array(4);
          for(let v = 0; v < 4; v++)
            num[v] = Math.floor( Math.random() * 65535 + 1 );
  
          switch(Number(ball)){
            case 1: t = 1; --left[0]; actionType = 3; break;
            case 2: t = 1.5; --left[1]; actionType = 3; break;
            case 3: t = 2; --left[2]; actionType = 3; break;
            case 4: actionType = 4; inc = 1; break;
            case 5: actionType = 2; break;
            case 6: {
              actionType = 1; 
              count = [0, 0, 0, 0, 0]; 
              left = [50, 30, 20]; 
              cri_point = 0; 
              all_inc = 0; 
              cri_judge = [5, 5, 5, 5]; 
              break;
            }
          }

          if(count[0] > all_inc && count[1] > all_inc && count[2] > all_inc && count[3] > all_inc){
            cri_point += 1.5;
            all_inc = 100;
          }
          if(count[0] >= cri_judge[0]){
            cri_point += 1.5;
            cri_judge[0] += 5;
          }
          else if(count[1] >= cri_judge[1]){
            cri_point += 1.5;
            cri_judge[1] += 5;
          }
          else if(count[2] >= cri_judge[2]){
            cri_point += 2.5;
            cri_judge[2] += 5;
          }
          else if(count[3] >= cri_judge[3]){
            cri_point += 3;
            cri_judge[3] += 5;
          }

          a = (corr[1] * 4096 * corr[0] * t) / (corr[1] * 3);
          b = 65535 / Math.sqrt(Math.sqrt(1044480 / a));
          c = (b * cri_point) / (4096);

          if(inc){
            poke = encount(corr, left);
          }

          if(cri < c){
            critical = '捕獲クリティカル！';
            k = 1;
          }
          if(actionType != 4 && actionType != 2){
            for(let u = 0; u < k; u++){
              if(num[u] < b) d += 1;
              else break;
            }
          }
          if(d == k){
            if(poke == 5){
              actionType = 5;
            }
            judgement = `やった!${mon}を捕まえた！`
            count[poke - 1]++;
            inc = 1;
          }
          else{
            judgement = `だめだ!${mon}がボールから出てしまった！`
            inc = 0;
          }
  
          const display = {
            judgement: judgement,
            mon: mon,
            critical: critical,
            count_pika: count[0],
            count_moko: count[1],
            count_nyor: count[2],
            count_danb: count[3],
            count_fire: count[4],
            left_mon: left[0],
            left_sup: left[1],
            left_hyp: left[2],
            cri_point: cri_point,
            a: a,
            b: b,
            c: c,
            cri: cri,
            num: num,
            actionType: actionType
          }
          res.render( 'pokemon', display );
        });
            
            // 計算が終わったら、DOM（HTML）を直接書き換える
            document.getElementById("judgement").innerText = `やった!${mon}を捕まえた！`;
            // 必要なステータス画面を更新...
        }
    </script>
</body>
</html>
