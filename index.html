<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポケモンゲット</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .game-box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        button { margin: 5px; padding: 10px; cursor: pointer; }
        .status { margin-top: 20px; background: #f0f0f0; padding: 10px; border-radius: 4px; }
        .end-msg { color: red; font-weight: bold; font-size: 1.2em; margin-top: 10px; }
        .clear-msg { color: #00cc66; font-weight: bold; font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>ポケモンゲット</h1>

    <div class="game-box">
        <p id="message">野生のポケモンが現れた！</p>
        <p><strong id="monster-name">ピカチュウが現れた！</strong></p> 
        <p id="critical-msg" style="color: red; font-weight: bold;"></p>
        
        <p id="game-end-status"></p>

        <hr>

        <p>どのボールを使う？</p>
        <button id="btn-ball-0" onclick="throwBall(1)">モンスターボール (残り: <span id="left-0">50</span>)</button>
        <button id="btn-ball-1" onclick="throwBall(2)">スーパーボール (残り: <span id="left-1">30</span>)</button>
        <button id="btn-ball-2" onclick="throwBall(3)">ハイパーボール (残り: <span id="left-2">20</span>)</button>
        <br><br>
        <button id="btn-next" onclick="throwBall(4)">次のポケモンを探す</button>
        
        <button id="btn-retry" onclick="throwBall(6)" style="background-color: #ccffcc; display: none;">もう一度遊ぶ？</button>
        <button id="btn-reset" onclick="throwBall(6)" style="background-color: #ffcccc;">リセット</button>

        <div class="status">
            <h3>つかまえた数</h3>
            <ul>
                <li>ピカチュウ: <span id="count-0">0</span></li>
                <li>モココ: <span id="count-1">0</span></li>
                <li>ニョロトノ: <span id="count-2">0</span></li>
                <li>ダンバル: <span id="count-3">0</span></li>
                <li>ファイヤー: <span id="count-4">0</span></li>
            </ul>
        </div>
    </div>

    <script>
        // ゲームの状態を管理する変数
        let mon = 'ピカチュウ';
        let poke = 1;
        let corr = [255, 20];
        let left = [50, 30, 20];
        let count = [0, 0, 0, 0, 0];
        
        let cri_point = 0;
        let inc = 0;
        let all_inc = 0;
        let cri_judge = [5, 5, 5, 5];
        let actionType = 1;

        // ポケモン出現ロジック
        function encount() {
            let choose = Math.floor(Math.random() * 5 + 1);
            if(choose == 1){
                mon = 'ピカチュウ'; corr[0] = 255; corr[1] = 20; return choose;
            }
            else if(choose == 2){
                mon = 'モココ'; corr[0] = 190; corr[1] = 26; return choose;
            }
            else if(choose == 3 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 20){
                mon = 'ニョロトノ'; corr[0] = 120; corr[1] = 41; return choose;
            }
            else if(choose == 4 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 20){
                mon = 'ダンバル'; corr[0] = 45; corr[1] = 52; return choose;
            }
            else if(choose == 5 && (50 - left[0] + 30 - left[1] + 20 - left[2]) >= 50){
                mon = 'ファイヤー'; corr[0] = 3; corr[1] = 165; return choose;
            }
            else{
                return encount(); // 条件に合わなければ再帰
            }
        }

        // ボールを投げた（または行動を選択した）ときの処理
        function throwBall(ballType) {
            let t = 1;
            let k = 4;
            let a = 0, b = 0, c = 0, d = 0;
            let critical = '';
            let judgement = '';

            const cri = Math.floor(Math.random() * 255 + 1);
            let num = new Array(4);
            for(let v = 0; v < 4; v++) num[v] = Math.floor(Math.random() * 65535 + 1);

            // リセット処理
            if (Number(ballType) === 6) {
                actionType = 1; 
                count = [0, 0, 0, 0, 0]; 
                left = [50, 30, 20]; 
                cri_point = 0; 
                all_inc = 0; 
                cri_judge = [5, 5, 5, 5]; 
                mon = 'ピカチュウ';
                poke = 1;
                corr = [255, 20];
                inc = 0;
                
                // ボタンの無効化を解除
                setButtonsDisabled(false);
                document.getElementById('btn-retry').style.display = 'none';
                document.getElementById('game-end-status').className = '';
                document.getElementById('game-end-status').innerText = '';

                updateDOM('初期化しました。ピカチュウが現れた！', '');
                return;
            }

            // ボール選択の処理
            switch(Number(ballType)){
                case 1: t = 1; --left[0]; actionType = 3; break;
                case 2: t = 1.5; --left[1]; actionType = 3; break;
                case 3: t = 2; --left[2]; actionType = 3; break;
                case 4: actionType = 4; inc = 1; break;
            }

            // 捕獲補正の計算
            if(count[0] > all_inc && count[1] > all_inc && count[2] > all_inc && count[3] > all_inc){
                cri_point += 1.5;
                all_inc = 100;
            }
            if(count[0] >= cri_judge[0]){ cri_point += 1.5; cri_judge[0] += 5; }
            else if(count[1] >= cri_judge[1]){ cri_point += 1.5; cri_judge[1] += 5; }
            else if(count[2] >= cri_judge[2]){ cri_point += 2.5; cri_judge[2] += 5; }
            else if(count[3] >= cri_judge[3]){ cri_point += 3; cri_judge[3] += 5; }

            a = (corr[1] * 4096 * corr[0] * t) / (corr[1] * 3);
            b = 65535 / Math.sqrt(Math.sqrt(1044480 / a));
            c = (b * cri_point) / (4096);

            // エンカウント処理
            if(inc || actionType === 4){
                poke = encount();
                inc = 0;
                updateDOM(`新しいポケモンが現れた！`, '');
                checkGameOver(); // 次を探した瞬間に弾切れの可能性もあるためチェック
                return;
            }

            // クリティカル判定
            if(cri < c){
                critical = '捕獲クリティカル！';
                k = 1;
            }

            // 捕獲判定のループ
            if(actionType != 4 && actionType != 2){
                for(let u = 0; u < k; u++){
                    if(num[u] < b) d += 1;
                    else break;
                }
            }

            // 結果の反映
            if(d == k){
                judgement = `やった! ${mon} を捕まえた！`;
                count[poke - 1]++;
                
                // ファイヤー(poke == 5)を捕まえたらゲームクリア！
                if(poke == 5){ 
                    actionType = 5; 
                    updateDOM(judgement, critical);
                    gameEnd(true); // クリア処理へ
                    return;
                }
                inc = 1; // 次は強制エンカウント
            } else {
                judgement = `だめだ! ${mon} がボールから出てしまった！`;
                inc = 0;
            }

            // 画面の表示を更新
            updateDOM(judgement, critical);

            // 通常のボール投擲後のゲームオーバーチェック
            checkGameOver();
        }

        // ボールがすべてゼロになったか調べる関数
        function checkGameOver() {
            if (left[0] <= 0 && left[1] <= 0 && left[2] <= 0) {
                gameEnd(false); // ゲームオーバー処理へ
            }
        }

        // ゲーム終了（クリアまたはオーバー）時の画面演出
        function gameEnd(isClear) {
            const statusLabel = document.getElementById('game-end-status');
            const retryBtn = document.getElementById('btn-retry');
            
            // 操作ボタンをすべてロック
            setButtonsDisabled(true);
            // 「もう一度遊ぶ？」ボタンを表示
            retryBtn.style.display = 'inline-block';

            if (isClear) {
                statusLabel.className = 'clear-msg';
                statusLabel.innerText = '🎉 伝説のポケモン「ファイヤー」を捕まえた！ゲームクリア！ 🎉';
            } else {
                statusLabel.className = 'end-msg';
                statusLabel.innerText = '❌ すべてのボールを使い切ってしまった… ゲームオーバー！ ❌';
            }
        }

        // ボタンの有効・無効を一括切り替えする便利関数
        function setButtonsDisabled(disabled) {
            document.getElementById('btn-ball-0').disabled = disabled;
            document.getElementById('btn-ball-1').disabled = disabled;
            document.getElementById('btn-ball-2').disabled = disabled;
            document.getElementById('btn-next').disabled = disabled;
        }

        // HTML上の表示を最新の状態に書き換える関数
        function updateDOM(judgement, critical) {
            document.getElementById('message').innerText = judgement;
            document.getElementById('monster-name').innerText = `${mon} が現れている！`;
            document.getElementById('critical-msg').innerText = critical;
            
            // 残りボール数更新
            document.getElementById('left-0').innerText = Math.max(0, left[0]);
            document.getElementById('left-1').innerText = Math.max(0, left[1]);
            document.getElementById('left-2').innerText = Math.max(0, left[2]);

            // モンスターボールが0個ならボタンを無効化（個別個数チェック）
            document.getElementById('btn-ball-0').disabled = (left[0] <= 0);
            document.getElementById('btn-ball-1').disabled = (left[1] <= 0);
            document.getElementById('btn-ball-2').disabled = (left[2] <= 0);

            // ゲット数更新
            document.getElementById('count-0').innerText = count[0];
            document.getElementById('count-1').innerText = count[1];
            document.getElementById('count-2').innerText = count[2];
            document.getElementById('count-3').innerText = count[3];
            document.getElementById('count-4').innerText = count[4];
        }
    </script>
</body>
